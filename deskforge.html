function ticketsView(){return head('Tickets','Track, triage, and resolve every request.',`<button class="btn" onclick="location.hash='#create'">+ New Ticket</button>`)+`<div class="filters"><input id="q" placeholder="Search tickets…"><select id="fs"><option value="">All statuses</option>${['Open','Assigned','In Progress','Pending','Resolved','Closed'].map(x=>`<option>${x}</option>`)}</select><select id="fp"><option value="">All priorities</option>${['Critical','High','Medium','Low'].map(x=>`<option>${x}</option>`)}</select><select id="fc"><option value="">All categories</option>${AppState.settings.categories.map(x=>`<option>${x}</option>`)}</select><select id="fa"><option value="">All assignees</option><option>Alex Morgan</option><option>Maya Chen</option><option>Unassigned</option></select></div>${role('Admin')?`<div class="toolbar"><span id="selected">0 selected</span><div class="spacer"></div><button class="btn secondary small" data-bulk="assign">Assign Alex</button><button class="btn secondary small" data-bulk="resolve">Mark resolved</button><button class="btn danger small" data-bulk="delete">Delete</button></div>`:''}<div id="ticketList">${ticketTable(visibleTickets(),role('Admin'))}</div>`}
function createView(){let agents='<option>Unassigned</option><option>Alex Morgan</option><option>Maya Chen</option>';return head('Create Ticket','Tell us what you need. We’ll take it from here.')+`<form class="card grid form-grid" id="ticketForm"><div class="full"><label>Title *</label><input name="title" required maxlength="100" placeholder="A concise summary of the issue"><div class="err"></div></div><div class="full"><label>Description *</label><textarea name="description" required rows="7" maxlength="2000" placeholder="What happened? Include any error messages and troubleshooting attempted."></textarea><div class="hint"><span id="chars">0</span>/2000</div></div><div><label>Category *</label><select name="category" required>${AppState.settings.categories.map(x=>`<option>${x}</option>`)}</select></div><div><label>Priority *</label><select name="priority">${['Low','Medium','High','Critical'].map(x=>`<option>${x}</option>`)}</select></div><div><label>Requester</label><input value="${AppState.session.name}" disabled></div>${canManage()?`<div><label>Assign To</label><select name="assignee">${agents}</select></div>`:''}<div><label>Attachment</label><input name="attachment" type="file"></div><div><label>Tags</label><input name="tags" placeholder="vpn, remote, urgent"></div><div class="full actions"><button class="btn">Create Ticket</button><button type="button" class="btn secondary" onclick="history.back()">Cancel</button></div></form>`}
function ticketDetail(id){let t=AppState.tickets.find(x=>x.id===id);if(!t)return head('Ticket not found','This ticket may have been deleted.');let comments=AppState.comments.filter(x=>x.ticketId===id&&(!role('End User')||!x.internal));let tab=AppState.tab;let body=tab==='Details'?`<div class="kv"><b>Requester</b><span>${t.requester}</span></div><div class="kv"><b>Assignee</b><span>${t.assignee}</span></div><div class="kv"><b>Category</b><span>${t.category}</span></div><div class="kv"><b>Created</b><span>${fmt(t.created)}</span></div><div class="kv"><b>Due</b><span>${fmt(t.due)}</span></div><div class="kv"><b>Tags</b><span>${t.tags.join(', ')||'—'}</span></div><h3>Description</h3><p style="line-height:1.7">${t.description}</p>`:tab==='Activity Log'?`<div class="timeline">${t.activity.slice().reverse().map(a=>`<div class="event"><b>${a.text}</b><div class="muted">${fmt(a.at)}</div></div>`).join('')}</div>`:tab==='Comments'?`${comments.map(c=>`<div class="comment ${c.internal?'internal':''}"><div class="comment-head"><span>${c.internal?'🔒 Internal note · ':''}${c.author}</span><span class="muted">${fmt(c.at)}</span></div><p>${c.text}</p></div>`)}<form id="commentForm"><textarea name="text" required rows="3" placeholder="Write a reply…"></textarea><div class="actions" style="margin-top:8px"><button class="btn small">Add reply</button>${canManage()?'<label class="toggle"><input class="check" name="internal" type="checkbox"> Internal note</label>':''}</div></form>`:`<div class="empty">No related tickets found.</div>`;return head(`${t.id} · ${t.title}`,`${badge(t.status)} ${badge(t.priority,'p')}`,`<button class="btn secondary no-print" onclick="print()">Print</button>`)+`<div class="grid detail-grid"><section class="card"><div class="tabs">${['Details','Activity Log','Comments','Related Tickets'].map(x=>`<button class="tab ${tab===x?'active':''}" data-tab="${x}">${x}</button>`).join('')}</div><div id="tabBody">${body}</div></section><aside class="card"><h3>SLA timer</h3><div style="font-size:18px;font-weight:800;margin-bottom:18px">${sla(t)}</div>${canManage()?`<label>Status</label><select id="changeStatus">${['Open','Assigned','In Progress','Pending','Resolved','Closed'].map(x=>`<option ${x===t.status?'selected':''}>${x}</option>`)}</select><label>Assign to</label><select id="changeAssignee">${['Unassigned','Alex Morgan','Maya Chen'].map(x=>`<option ${x===t.assignee?'selected':''}>${x}</option>`)}</select><label>Priority</label><select id="changePriority">${['Low','Medium','High','Critical'].map(x=>`<option ${x===t.priority?'selected':''}>${x}</option>`)}</select>`:''}<hr style="border:0;border-top:1px solid var(--line);margin:20px 0"><b>Ticket age</b><p class="muted">${Math.floor((Date.now()-new Date(t.created))/36e5)} hours</p></aside></div>`}
function kbView(){return head('Knowledge Base','Answers for common IT questions.')+`<input id="kbq" placeholder="Search knowledge articles…" style="max-width:520px;margin-bottom:18px"><div class="grid kb-grid" id="kbgrid">${AppState.kb.map(a=>`<article class="card article" data-article="${a.id}"><span class="badge">${a.category}</span><h3>${a.title}</h3><p class="muted">A step-by-step guide from the IT team.</p><b style="color:var(--p)">Read article →</b></article>`).join('')}</div>`}function articleView(id){let a=AppState.kb.find(x=>x.id==id);return head(a.title,a.category,`<button class="btn secondary" onclick="location.hash='#kb'">← Back</button>`)+`<article class="card" style="max-width:850px;line-height:1.75">${a.content}<hr style="border:0;border-top:1px solid var(--line)"><p>Was this article helpful?</p><button class="btn secondary small vote" data-v="helpful">👍 Yes (${a.helpful})</button> <button class="btn secondary small vote" data-v="notHelpful">👎 No (${a.notHelpful})</button><p class="muted">Related to ${AppState.tickets.filter(t=>t.category.includes(a.category)).length} tickets</p></article>`}

function render(){if(!AppState.session){document.body.className='';$('#app').innerHTML=loginView();bindLogin();return}document.body.className=AppState.settings.dark?'dark':'';let h=location.hash||'#dashboard',content=h==='#dashboard'?dashboard():h==='#tickets'?ticketsView():h==='#create'?createView():h==='#kb'?kbView():h==='#reports'&&role('Admin')?reports():h==='#users'&&role('Admin')?usersView():h==='#settings'&&role('Admin')?settingsView():h.startsWith('#ticket/')?ticketDetail(h.split('/')[1]):h.startsWith('#article/')?articleView(h.split('/')[1]):dashboard();$('#app').innerHTML=layout(content);bind(h)}
function bindLogin(){$('#login').onsubmit=e=>{e.preventDefault();let u=AppState.users.find(x=>x.username===$('#lu').value&&x.password===$('#lp').value&&x.active);if(!u){$('#loginErr').textContent='Incorrect username or password.';return}AppState.session={username:u.username,name:u.name,role:u.role};store('df_session',AppState.session);location.hash='#dashboard';render();setTimeout(()=>toast(`Welcome to DeskForge, ${u.name.split(' ')[0]}!`),100)}}
function bind(h){$('#logout').onclick=()=>{localStorage.removeItem('df_session');AppState.session=null;location.hash='';render()};$('#bell').onclick=()=>{let old=$('.notif');if(old)return old.remove();let n=document.createElement('div');n.className='notif';n.innerHTML='<b>Notifications</b>'+AppState.notifications.slice(0,5).map(x=>`<div>${x.read?'':'🔵 '}${x.text}</div>`).join('');$('.top').append(n);AppState.notifications.forEach(x=>x.read=true);save('notifications');renderSoonBadge()};$('#globalSearch').onkeydown=e=>{if(e.key==='Enter'){location.hash='#tickets';setTimeout(()=>{$('#q').value=e.target.value;filterTickets()},50)}};if(h==='#tickets')bindTickets();if(h==='#create')bindCreate();if(h.startsWith('#ticket/'))bindDetail(h.split('/')[1]);if(h==='#kb'){$('#kbq').oninput=e=>$$('.article').forEach(x=>x.hidden=!x.innerText.toLowerCase().includes(e.target.value.toLowerCase()));$$('.article').forEach(x=>x.onclick=()=>location.hash='#article/'+x.dataset.article)}if(h.startsWith('#article/'))$$('.vote').forEach(b=>b.onclick=()=>{let a=AppState.kb.find(x=>x.id==h.split('/')[1]);a[b.dataset.v]++;save('kb');toast('Thanks for your feedback!');render()});if(h==='#reports')$('#csv').onclick=exportCSV;if(h==='#users')bindUsers();if(h==='#settings')bindSettings()}
function renderSoonBadge(){let b=$('.bell-count');if(b)b.remove()}function bindTickets(){['q','fs','fp','fc','fa'].forEach(id=>$('#'+id).oninput=filterTickets);$$('th[data-sort]').forEach(x=>x.onclick=()=>{AppState.dir=AppState.sort===x.dataset.sort?-AppState.dir:1;AppState.sort=x.dataset.sort;filterTickets()});$('#all')?.addEventListener('change',e=>{$$('.rowcheck').forEach(x=>x.checked=e.target.checked);selected()});document.addEventListener('change',e=>{if(e.target.matches('.rowcheck'))selected()},{once:true});$$('[data-bulk]').forEach(b=>b.onclick=()=>bulk(b.dataset.bulk))}function selected(){let n=$$('.rowcheck:checked').length;if($('#selected'))$('#selected').textContent=`${n} selected`}function filterTickets(){let q=$('#q').value.toLowerCase(),v={status:$('#fs').value,priority:$('#fp').value,category:$('#fc').value,assignee:$('#fa').value};let t=visibleTickets().filter(x=>(x.id+x.title+x.requester).toLowerCase().includes(q)&&Object.entries(v).every(([k,z])=>!z||x[k]===z)).sort((a,b)=>String(a[AppState.sort]).localeCompare(String(b[AppState.sort]))*AppState.dir);$('#ticketList').innerHTML=ticketTable(t,role('Admin'));bindTickets()}function bulk(a){let ids=$$('.rowcheck:checked').map(x=>x.dataset.id);if(!ids.length)return toast('Select at least one ticket');if(a==='delete')AppState.tickets=AppState.tickets.filter(x=>!ids.includes(x.id));else AppState.tickets.forEach(t=>{if(ids.includes(t.id)){t[a==='assign'?'assignee':'status']=a==='assign'?'Alex Morgan':'Resolved';t.activity.push({at:now(),text:`Bulk action applied by ${AppState.session.name}`})}});save('tickets');toast('Bulk action completed');render()}
function bindCreate(){let ta=$('[name=description]');ta.oninput=()=>$('#chars').textContent=ta.value.length;$('#ticketForm').onsubmit=e=>{e.preventDefault();let f=new FormData(e.target),p=f.get('priority'),id='TKT-'+String(Math.max(...AppState.tickets.map(x=>+x.id.slice(4)))+1).padStart(4,'0'),created=new Date(),due=new Date(created.getTime()+AppState.settings.sla[p]*36e5);let t={id,title:f.get('title').trim(),description:f.get('description').trim(),category:f.get('category'),priority:p,requester:AppState.session.name,assignee:f.get('assignee')||'Unassigned',status:f.get('assignee')&&f.get('assignee')!=='Unassigned'?'Assigned':'Open',created:created.toISOString(),due:due.toISOString(),tags:(f.get('tags')||'').split(',').map(x=>x.trim()).filter(Boolean),attachment:f.get('attachment')?.name||'',activity:[{at:now(),text:`Ticket created by ${AppState.session.name}`}]};if(!t.title||!t.description)return toast('Please complete all required fields');AppState.tickets.unshift(t);save('tickets');toast(`${id} created successfully`);location.hash='#ticket/'+id}}
function bindDetail(id){let t=AppState.tickets.find(x=>x.id===id);$$('[data-tab]').forEach(x=>x.onclick=()=>{AppState.tab=x.dataset.tab;render()});['Status','Assignee','Priority'].forEach(k=>{$('#change'+k)?.addEventListener('change',e=>{let prop=k.toLowerCase(),old=t[prop];t[prop]=e.target.value;t.activity.push({at:now(),text:`${k} changed from ${old} → ${e.target.value} by ${AppState.session.name}`});if(k==='Status'&&e.target.value==='Resolved')confetti();save('tickets');toast(`${k} updated`);render()})});$('#commentForm')?.addEventListener('submit',e=>{e.preventDefault();let f=new FormData(e.target);AppState.comments.push({id:Date.now(),ticketId:id,author:AppState.session.name,text:f.get('text'),internal:f.get('internal')==='on',at:now()});t.activity.push({at:now(),text:`Comment added by ${AppState.session.name}`});save('comments');save('tickets');render()})}function confetti(){for(let i=0;i<30;i++){let x=document.createElement('i');Object.assign(x.style,{position:'fixed',left:50+Math.random()*50+'%',top:'25%',width:'7px',height:'7px',background:['#10b981','#f59e0b','#0ea5e9'][i%3],zIndex:100,transition:'1s'});document.body.append(x);requestAnimationFrame(()=>Object.assign(x.style,{transform:`translate(${Math.random()*300-150}px,${Math.random()*350}px) rotate(250deg)`,opacity:0}));setTimeout(()=>x.remove(),1100)}}
function bindUsers(){$$('.userRole').forEach(x=>x.onchange=()=>{AppState.users.find(u=>u.id==x.dataset.id).role=x.value;save('users');toast('Role updated')});$$('.toggleUser').forEach(x=>x.onclick=()=>{let u=AppState.users.find(u=>u.id==x.dataset.id);u.active=!u.active;save('users');render()});$$('.reset').forEach(x=>x.onclick=()=>toast('Password reset link sent'));$('#addUser').onclick=()=>{let name=prompt('New user full name');if(!name)return;let username=prompt('Username');if(!username)return;AppState.users.push({id:Date.now(),name,username,password:'welcome123',role:'End User',active:true});save('users');render();toast('User added')}}function bindSettings(){$('#settingsForm').onsubmit=e=>{e.preventDefault();let f=new FormData(e.target);AppState.settings.company=f.get('company');AppState.settings.email=f.get('email');AppState.settings.timezone=f.get('timezone');AppState.settings.dark=f.get('dark')==='on';AppState.settings.notifications=f.get('notifications')==='on';Object.keys(AppState.settings.sla).forEach(k=>AppState.settings.sla[k]=+f.get('sla_'+k));save('settings');toast('Settings saved');render()}}function exportCSV(){let cols=['id','title','requester','assignee','priority','status','category','created','due'],csv=[cols.join(','),...AppState.tickets.map(t=>cols.map(k=>`"${String(t[k]).replaceAll('"','""')}"`).join(','))].join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='deskforge-tickets.csv';a.click();URL.revokeObjectURL(a.href)}
