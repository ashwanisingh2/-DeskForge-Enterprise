services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deskforge
      POSTGRES_USER: deskforge
      POSTGRES_PASSWORD: deskforge_local_only
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U deskforge"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: deskforge
      MINIO_ROOT_PASSWORD: deskforge_minio_local
    ports: ["9000:9000","9001:9001"]
    volumes: ["minio_data:/data"]
  app:
    build: .
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    environment:
      DATABASE_URL: postgresql://deskforge:deskforge_local_only@postgres:5432/deskforge
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: replace-for-local-development
    ports: ["3000:3000"]
volumes:
  postgres_data:
  redis_data:
  minio_data:
